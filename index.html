<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎮 Juegos de Carrera</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }

.pantalla { display:none; }
.activa { display:block; }

#pista {
  width:90%;
  height:260px;
  margin:20px auto;
  border:2px solid white;
  position:relative;
}

.meta {
  position:absolute;
  right:0;
  width:20px;
  height:100%;
  background: repeating-linear-gradient(
    0deg, white 0px, white 10px, black 10px, black 20px
  );
}

.personaje {
  position:absolute;
  font-size:32px;
  transition:0.4s linear;
}

#c0 { top:10%; }
#c1 { top:35%; }
#c2 { top:60%; }
#c3 { top:85%; }

#mensajeUnion {
  margin-top:10px;
  font-size:18px;
  color: lightgreen;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div id="menu" class="pantalla activa">
  <h1>🎮 Selecciona juego</h1>
  <button onclick="iniciarModo('camellos')">🐪 Camellos</button>
  <button onclick="iniciarModo('atletismo')">🏃 Atletismo</button>
  <button onclick="iniciarModo('caballos')">🐎 Caballos</button>
</div>

<div id="juego" class="pantalla">

<h1 id="titulo"></h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button id="btnCrear" onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<h3 id="mensajeUnion"></h3>

<br><br>

<button onclick="empezar()">🚀 Empezar carrera</button>

<h2 id="pregunta"></h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta" placeholder="Ej: 57 26 o 15.75">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">
  <div class="meta"></div>
  <div id="c0" class="personaje"></div>
  <div id="c1" class="personaje"></div>
  <div id="c2" class="personaje"></div>
  <div id="c3" class="personaje"></div>
</div>

<h2>🏆 Ranking global</h2>
<div id="ranking"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let modo="camellos";
let sala=null, grupo=null;
let META=20;
let tiempo=40, intervalo, respondido=false;
let preguntaActual=null;

// modo
function iniciarModo(m){
  modo=m;
  document.getElementById("menu").classList.remove("activa");
  document.getElementById("juego").classList.add("activa");

  if(m==="camellos"){
    document.getElementById("titulo").innerText="🐪 Carrera de Camellos";
    poner("🐫➡️");
    document.getElementById("pista").style.background="#222";
  } else if(m==="atletismo"){
    document.getElementById("titulo").innerText="🏃 Carrera de Atletismo";
    poner("🏃‍♂️➡️");
    document.getElementById("pista").style.background="#8B4513";
  } else {
    document.getElementById("titulo").innerText="🐎 Carrera de Caballos";
    poner("🐎➡️");
    document.getElementById("pista").style.background="#3a3a3a";
  }
}

function poner(icono){
  for(let i=0;i<4;i++){
    document.getElementById("c"+i).innerText=icono;
  }
}

// 🔥 NUEVA GENERACIÓN DE PREGUNTAS
function nuevaPregunta(){
  let tipo=Math.floor(Math.random()*3);

  let g=Math.floor(Math.random()*361);
  let m=Math.floor(Math.random()*60);

  if(tipo===0){
    return {
      texto:`${g}° ${m}' → minutos`,
      respuesta:g*60+m,
      tipo:"minutos"
    };
  }

  if(tipo===1){
    return {
      texto:`${g}° ${m}' → grados`,
      respuesta:g+(m/60),
      tipo:"grados"
    };
  }

  // 🔥 decimal → grados minutos
  let decimal=(Math.random()*360).toFixed(2);
  let grados=Math.floor(decimal);
  let minutos=Math.round((decimal-grados)*60);

  return {
    texto:`${decimal}° → grados y minutos`,
    respuesta: grados + " " + minutos,
    tipo:"convertir"
  };
}

// resto igual hasta responder

function responder(){
  let val=document.getElementById("respuesta").value.trim();
  if(val===""||respondido)return;
  respondido=true;

  val = val.replace(",", ".");

  let correcto=false;
  let solucion="";

  if(preguntaActual.tipo==="minutos"){
    correcto = Number(val) === preguntaActual.respuesta;
    solucion=preguntaActual.respuesta;
  }
  else if(preguntaActual.tipo==="grados"){
    correcto = Math.abs(Number(val)-preguntaActual.respuesta)<0.01;
    solucion=preguntaActual.respuesta.toFixed(2);
  }
  else{
    correcto = val===preguntaActual.respuesta;
    solucion=preguntaActual.respuesta;
  }

  document.getElementById("resultado").innerText =
    correcto?"✅ Correcto":"❌ Incorrecto → "+solucion;

  db.ref("salas/"+sala).once("value").then(snap=>{
    let d=snap.val();
    let pos=d.jugadores[grupo].pos;

    if(correcto){ pos++; }
    else{ pos--; if(pos<0) pos=0; }

    if(pos>=META){
      db.ref("salas/"+sala).update({
        terminado:true,
        posiciones:ordenar(d.jugadores)
      });
      asignarPuntos(d.jugadores);
    }

    db.ref(`salas/${sala}/jugadores/${grupo}`).update({pos});
  });

  document.getElementById("respuesta").value="";
  setTimeout(()=>nuevaRonda(),500);
}
</script>

</body>
</html>
