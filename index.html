<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Olimpiadas Gradoolímpicas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#fde68a;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:16px;margin-bottom:20px}
button{padding:10px;border:none;border-radius:10px;margin:5px;cursor:pointer}
.primary{background:#2563eb;color:white}
.success{background:#16a34a;color:white}
.camel{font-size:30px;position:absolute;transition:0.3s}
.track{position:relative;height:50px;background:#fcd34d;margin:10px;border-radius:10px}
.finish{position:absolute;right:0;width:5px;height:100%;background:black}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<h1>🐪 Olimpiadas Gradoolímpicas</h1>

<div class="card">
<button class="primary" onclick="createRace()">Crear carrera</button>
<p id="code"></p>
</div>

<div class="card">
<input id="room" placeholder="Código">
<input id="name" placeholder="Nombre">
<select id="team">
<option value="A">Grupo A</option>
<option value="B">Grupo B</option>
<option value="C">Grupo C</option>
<option value="D">Grupo D</option>
<option value="E">Grupo E</option>
</select>
<button class="success" onclick="join()">Entrar</button>
</div>

<div class="card hidden" id="game">
<h2 id="player"></h2>
<div id="question"></div>
<input id="answer" placeholder="respuesta">
<button onclick="check()">Responder</button>
<p id="result"></p>
</div>

<div class="card">
<h2>Carrera</h2>
<div id="race"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCM7TJS74FMJCdv0zALrR11Hf66OPx7eSk",
  authDomain: "olimpiadas-gradoolimpicas.firebaseapp.com",
  projectId: "olimpiadas-gradoolimpicas",
  storageBucket: "olimpiadas-gradoolimpicas.firebasestorage.app",
  messagingSenderId: "774721061799",
  appId: "1:774721061799:web:34ad8e40a90d7322936c82",
  measurementId: "G-S526TMJ2YJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let roomId="";
let team="";
let exercise;

function randomCode(){
 return Math.random().toString(36).substring(2,7).toUpperCase();
}

window.createRace = async ()=>{
 roomId=randomCode();
 await setDoc(doc(db,"races",roomId),{
  positions:{A:0,B:0,C:0,D:0,E:0},
  goal:15,
  status:"live"
 });
 document.getElementById("code").innerText="Código: "+roomId;
 listen(roomId);
}

window.join = async ()=>{
 roomId=document.getElementById("room").value.toUpperCase();
 team=document.getElementById("team").value;
 document.getElementById("player").innerText="Equipo "+team;
 document.getElementById("game").classList.remove("hidden");
 listen(roomId);
 newQ();
}

function listen(id){
 onSnapshot(doc(db,"races",id),(snap)=>{
  let data=snap.data();
  draw(data.positions,data.goal);
 });
}

function draw(pos,goal){
 let html="";
 for(let t of ["A","B","C","D","E"]){
  let p=pos[t]||0;
  let left=(p/goal)*90;
  html+=`
  <div class="track">
    <div class="camel" style="left:${left}%">🐪</div>
    <div class="finish"></div>
    <span>Grupo ${t}: ${p}</span>
  </div>`;
 }
 document.getElementById("race").innerHTML=html;
}

function newQ(){
 let g=Math.floor(Math.random()*10)+1;
 let m=Math.floor(Math.random()*60);
 exercise={g,m,sol:g*60+m};
 document.getElementById("question").innerText=
 `Convierte ${g}° ${m}′ a minutos`;
}

window.check = async ()=>{
 let user=parseInt(document.getElementById("answer").value);
 let ref=doc(db,"races",roomId);
 let snap=await getDoc(ref);
 let pos=snap.data().positions;

 if(user===exercise.sol){
  pos[team]++;
  document.getElementById("result").innerText="✅ Correcto";
 }else{
  pos[team]=Math.max(0,pos[team]-1);
  document.getElementById("result").innerText="❌ Incorrecto";
 }

 await updateDoc(ref,{positions:pos});
 newQ();
}

</script>

</body>
</html>
