<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎮 Juegos de Carrera</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }

.pantalla { display:none; }
.activa { display:block; }

#pista {
  width:90%;
  height:260px;
  margin:20px auto;
  border:2px solid white;
  position:relative;
}

.meta {
  position:absolute;
  right:0;
  width:20px;
  height:100%;
  background: repeating-linear-gradient(
    0deg, white 0px, white 10px, black 10px, black 20px
  );
}

.personaje {
  position:absolute;
  font-size:32px;
  transition:0.4s linear;
}

#c0 { top:10%; }
#c1 { top:35%; }
#c2 { top:60%; }
#c3 { top:85%; }

#mensajeUnion {
  margin-top:10px;
  font-size:18px;
  color: lightgreen;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<div id="menu" class="activa">
  <h1>🎮 Selecciona juego</h1>
  <button onclick="iniciarModo('camellos')">🐪 Camellos</button>
  <button onclick="iniciarModo('atletismo')">🏃 Atletismo</button>
  <button onclick="iniciarModo('caballos')">🐎 Caballos</button>
</div>

<div id="juego">

<h1 id="titulo"></h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
<option value="0">Grupo 1</option>
<option value="1">Grupo 2</option>
<option value="2">Grupo 3</option>
<option value="3">Grupo 4</option>
</select>

<br>

<button id="btnCrear" onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<h3 id="mensajeUnion"></h3>

<button onclick="empezar()">🚀 Empezar</button>

<h2 id="pregunta"></h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">
<div class="meta"></div>
<div id="c0" class="personaje"></div>
<div id="c1" class="personaje"></div>
<div id="c2" class="personaje"></div>
<div id="c3" class="personaje"></div>
</div>

<h2>🏆 Ranking</h2>
<div id="ranking"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
authDomain: "camellos-dcf0d.firebaseapp.com",
databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sala=null, grupo=null;
let META=20;
let intervalo, tiempo=40, respondido=false;
let preguntaActual=null;

function iniciarModo(m){
document.getElementById("menu").style.display="none";
document.getElementById("juego").style.display="block";

let icono = m==="camellos"?"🐫➡️":m==="atletismo"?"🏃":"🐎";

for(let i=0;i<4;i++){
document.getElementById("c"+i).innerText=icono;
}
}

// preguntas
function nuevaPregunta(){
let tipo=Math.floor(Math.random()*3);

let g=Math.floor(Math.random()*361);
let m=Math.floor(Math.random()*60);

if(tipo===0){
return {texto:`${g}° ${m}' → minutos`,respuesta:g*60+m,tipo:"min"};
}
if(tipo===1){
return {texto:`${g}° ${m}' → grados`,respuesta:g+(m/60),tipo:"deg"};
}

// decimal
let dec=(Math.random()*360).toFixed(2);
let gr=Math.floor(dec);
let mi=Math.round((dec-gr)*60);

return {texto:`${dec}° → grados minutos`,respuesta:gr+" "+mi,tipo:"conv"};
}

// crear sala
function crearSala(){
sala=Math.random().toString(36).substring(2,6).toUpperCase();
grupo=document.getElementById("grupo").value;

document.getElementById("codigoSala").innerText=sala;
document.getElementById("btnCrear").disabled=true;

db.ref("salas/"+sala).set({
jugadores:{0:{pos:0},1:{pos:0},2:{pos:0},3:{pos:0}},
empezado:false,
terminado:false
});

escuchar();
}

// unirse
function unirse(){
sala=document.getElementById("codigo").value.toUpperCase();
grupo=document.getElementById("grupo").value;
let nombre=document.getElementById("nombre").value;

document.getElementById("mensajeUnion").innerText=
nombre+" unido al grupo "+(parseInt(grupo)+1);

escuchar();
}

// escuchar
function escuchar(){
db.ref("salas/"+sala).on("value",snap=>{
let d=snap.val(); if(!d)return;

for(let i=0;i<4;i++){
let x=(d.jugadores[i].pos/META)*100;
document.getElementById("c"+i).style.left=x+"%";
}

if(d.empezado && !intervalo){
nuevaRonda();
}

if(d.terminado){
document.getElementById("ganador").innerText="🏆 FIN";
clearInterval(intervalo);
}
});
}

// empezar
function empezar(){
db.ref("salas/"+sala).update({empezado:true});
}

// ronda
function nuevaRonda(){
preguntaActual=nuevaPregunta();
document.getElementById("pregunta").innerText=preguntaActual.texto;
iniciarTimer();
}

// timer
function iniciarTimer(){
clearInterval(intervalo);
tiempo=40;
respondido=false;

intervalo=setInterval(()=>{
document.getElementById("timer").innerText=tiempo;
tiempo--;
if(tiempo<0) nuevaRonda();
},1000);
}

// responder
function responder(){
let val=document.getElementById("respuesta").value.trim();
if(val===""||respondido)return;
respondido=true;

val=val.replace(",",".");
let correcto=false;

if(preguntaActual.tipo==="min"){
correcto=Number(val)===preguntaActual.respuesta;
}
else if(preguntaActual.tipo==="deg"){
correcto=Math.abs(Number(val)-preguntaActual.respuesta)<0.01;
}
else{
correcto=val===preguntaActual.respuesta;
}

document.getElementById("resultado").innerText=
correcto?"✅":"❌ "+preguntaActual.respuesta;

db.ref("salas/"+sala).once("value").then(snap=>{
let d=snap.val();
let pos=d.jugadores[grupo].pos;

if(correcto) pos++;
else {pos--; if(pos<0)pos=0;}

if(pos>=META){
db.ref("salas/"+sala).update({terminado:true});
}

db.ref("salas/"+sala+"/jugadores/"+grupo).update({pos});
});

document.getElementById("respuesta").value="";
setTimeout(nuevaRonda,500);
}
</script>

</body>
</html>
