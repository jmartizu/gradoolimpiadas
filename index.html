<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Camel Race Online</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(#1e1e2f, #0d0d1a);
  color: white;
}

h1 { margin-top: 10px; }

#menu { margin: 20px; }

#pista {
  margin: 20px;
  height: 220px;
  border: 2px solid white;
  position: relative;
}

.camello {
  position: absolute;
  left: 0;
  font-size: 30px;
  transition: transform 0.3s;
}

#c0 { top: 10px; }
#c1 { top: 60px; }
#c2 { top: 110px; }
#c3 { top: 160px; }

input, button {
  padding: 10px;
  margin: 5px;
}

#ranking {
  list-style: none;
  padding: 0;
}
</style>
</head>

<body>

<h1>🐪 Camel Race Online</h1>

<div id="menu">
  <input id="name" placeholder="Tu nombre">
  <button onclick="crearSala()">Crear sala</button>
  <input id="codigo" placeholder="Código">
  <button onclick="unirseSala()">Unirse</button>
</div>

<h2 id="pregunta"></h2>

<div id="pista">
  <div class="camello" id="c0">🐪</div>
  <div class="camello" id="c1">🐪</div>
  <div class="camello" id="c2">🐪</div>
  <div class="camello" id="c3">🐪</div>
</div>

<div>
  <input id="respuesta" placeholder="Respuesta">
  <button onclick="responder()">OK</button>
</div>

<h2>🏆 Ranking</h2>
<ul id="ranking"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, update, onValue, get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ✅ TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyCM7TJS74FMJCdv0zALrR11Hf66OPx7eSk",
  authDomain: "olimpiadas-gradoolimpicas.firebaseapp.com",
  projectId: "olimpiadas-gradoolimpicas",
  storageBucket: "olimpiadas-gradoolimpicas.firebasestorage.app",
  messagingSenderId: "774721061799",
  appId: "1:774721061799:web:34ad8e40a90d7322936c82",
  measurementId: "G-S526TMJ2YJ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let sala = null;
let jugador = null;

// 🎲 código sala
function codigoRandom() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// 🏁 crear sala
window.crearSala = async () => {
  const nombre = document.getElementById("name").value;

  const code = codigoRandom();

  await set(ref(db, "salas/" + code), {
    jugadores: {
      0: { nombre, pos: 0 }
    }
  });

  sala = code;
  jugador = 0;
  escuchar();
};

// 👥 unirse
window.unirseSala = async () => {
  const code = document.getElementById("codigo").value.toUpperCase();
  const nombre = document.getElementById("name").value;

  const snap = await get(ref(db, "salas/" + code));

  if (!snap.exists()) return alert("No existe");

  const jugadores = snap.val().jugadores;
  const index = Object.keys(jugadores).length;

  if (index >= 4) return alert("Sala llena");

  await update(ref(db, "salas/" + code + "/jugadores/" + index), {
    nombre,
    pos: 0
  });

  sala = code;
  jugador = index;
  escuchar();
};

// 👂 escuchar cambios
function escuchar() {
  onValue(ref(db, "salas/" + sala), snap => {
    const data = snap.val();
    render(data);
  });
}

// 🧠 preguntas
function generarPregunta() {
  if (Math.random() > 0.5) {
    let g = Math.floor(Math.random() * 50);
    let m = Math.floor(Math.random() * 60);
    return {
      texto: `${g}° ${m}' → decimal`,
      respuesta: (g + m / 60).toFixed(2)
    };
  } else {
    let val = (Math.random() * 50).toFixed(2);
    let min = Math.round((val % 1) * 60);
    return {
      texto: `${val}° → grados y minutos (ej: 12 30)`,
      respuesta: `${Math.floor(val)} ${min}`
    };
  }
}

let pregunta = generarPregunta();

function render(data) {
  document.getElementById("pregunta").innerText = pregunta.texto;

  const ranking = document.getElementById("ranking");
  ranking.innerHTML = "";

  Object.entries(data.jugadores).forEach(([i, j]) => {
    document.getElementById("c" + i).style.transform =
      `translateX(${j.pos * 10}px)`;

    ranking.innerHTML += `<li>${j.nombre} (${j.pos})</li>`;
  });
}

// ✅ responder
window.responder = async () => {
  const val = document.getElementById("respuesta").value;

  const correcto = val == pregunta.respuesta;

  const refJugador = ref(db, `salas/${sala}/jugadores/${jugador}`);
  const snap = await get(refJugador);

  let pos = snap.val().pos;
  pos = correcto ? pos + 1 : pos - 1;

  await update(refJugador, { pos });

  pregunta = generarPregunta();
};
</script>

</body>
</html>
```
