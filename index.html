<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎮 Juegos de Carrera</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }

.pantalla { display:none; }
.activa { display:block; }

#pista {
  width: 90%;
  height: 260px;
  margin: 20px auto;
  border: 2px solid white;
  position: relative;
  background: #222;
}

/* 🏁 meta */
.meta {
  position:absolute;
  right:0;
  width:20px;
  height:100%;
  background:repeating-linear-gradient(
    0deg, white 0px, white 10px, black 10px, black 20px
  );
}

/* 🛣️ carriles */
.carril {
  position:absolute;
  width:100%;
  height:25%;
  border-bottom:1px dashed gray;
}

/* 🐪🏃 personajes */
.personaje {
  position:absolute;
  left:0;
  font-size:30px;
  transition: transform 0.4s linear;
}

/* posiciones */
#c0 { top: 5%; }
#c1 { top: 30%; }
#c2 { top: 55%; }
#c3 { top: 80%; }

button { margin:5px; padding:10px; }
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="pantalla activa">
  <h1>🎮 Selecciona juego</h1>
  <button onclick="iniciarModo('camellos')">🐪 Camellos</button>
  <button onclick="iniciarModo('atletismo')">🏃 Atletismo</button>
</div>

<!-- JUEGO -->
<div id="juego" class="pantalla">

<h1 id="titulo"></h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<br><br>

<button onclick="empezarCarrera()">🚀 Empezar carrera</button>

<h2 id="pregunta">Esperando...</h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta" placeholder="Respuesta">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">

  <div class="carril" style="top:0%"></div>
  <div class="carril" style="top:25%"></div>
  <div class="carril" style="top:50%"></div>
  <div class="carril" style="top:75%"></div>

  <div class="meta"></div>

  <div class="personaje" id="c0"></div>
  <div class="personaje" id="c1"></div>
  <div class="personaje" id="c2"></div>
  <div class="personaje" id="c3"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let modo="camellos";
let sala=null, grupo=null;
let META=20; // 🔥 ahora 20 aciertos
let tiempo=40, intervalo, respondido=false;
let preguntaActual=null;

// 🎮 modo
function iniciarModo(m){
  modo=m;
  document.getElementById("menu").classList.remove("activa");
  document.getElementById("juego").classList.add("activa");

  if(m==="camellos"){
    document.getElementById("titulo").innerText="🐪 Carrera de Camellos";
    poner("🐫➡️");
  } else {
    document.getElementById("titulo").innerText="🏃 Carrera de Atletismo";
    poner("🏃‍♂️➡️");
    document.getElementById("pista").style.background="#8B4513";
  }
}

// personajes
function poner(icono){
  for(let i=0;i<4;i++){
    document.getElementById("c"+i).innerText=icono;
  }
}

// preguntas
function nuevaPregunta(){
  let g=Math.floor(Math.random()*50);
  let m=Math.floor(Math.random()*60);

  if(Math.random()>0.5){
    return { texto:`${g}° ${m}' → minutos`, respuesta:(g*60+m)+"" };
  } else {
    return { texto:`${g}° ${m}' → grados`, respuesta:(g+m/60).toFixed(2) };
  }
}

// crear
function crearSala(){
  sala=Math.random().toString(36).substring(2,6).toUpperCase();
  grupo=document.getElementById("grupo").value;

  document.getElementById("codigoSala").innerText=sala;

  db.ref("salas/"+sala).set({
    jugadores:{0:{pos:0},1:{pos:0},2:{pos:0},3:{pos:0}},
    ganador:null,
    empezado:false
  });

  escuchar();
}

// unirse
function unirse(){
  sala=document.getElementById("codigo").value.toUpperCase();
  grupo=document.getElementById("grupo").value;
  escuchar();
}

// empezar
function empezarCarrera(){
  db.ref("salas/"+sala).update({empezado:true});
}

// escuchar
function escuchar(){
  db.ref("salas/"+sala).on("value",snap=>{
    const d=snap.val(); if(!d)return;

    for(let i=0;i<4;i++){
      let porcentaje = (d.jugadores[i]?.pos || 0) / META * 100;
      document.getElementById("c"+i).style.transform =
        `translateX(${porcentaje}%)`;
    }

    if(d.empezado && !intervalo){
      nuevaRonda();
    }

    if(d.ganador!=null){
      document.getElementById("ganador").innerText="🏆 Grupo "+(+d.ganador+1);
      clearInterval(intervalo);
    }
  });
}

// ronda
function nuevaRonda(){
  preguntaActual=nuevaPregunta();
  document.getElementById("pregunta").innerText=preguntaActual.texto;
  iniciarTimer();
}

// timer
function iniciarTimer(){
  clearInterval(intervalo);
  tiempo=40;
  respondido=false;
  document.getElementById("resultado").innerText="";

  intervalo=setInterval(()=>{
    document.getElementById("timer").innerText="Tiempo: "+tiempo;
    tiempo--;

    if(tiempo<0){
      nuevaRonda();
    }
  },1000);
}

// responder
function responder(){
  const val=document.getElementById("respuesta").value.trim();
  if(val==="")return;
  if(respondido)return;
  respondido=true;

  let correcto=val==preguntaActual.respuesta;

  document.getElementById("resultado").innerText=
    correcto?"✅ Correcto":"❌ Incorrecto";

  db.ref("salas/"+sala).once("value").then(snap=>{
    const d=snap.val();
    let pos=d.jugadores[grupo].pos;

    if(correcto) pos++;

    if(pos>=META){
      db.ref("salas/"+sala).update({ganador:grupo});
    }

    db.ref(`salas/${sala}/jugadores/${grupo}`).update({pos});
  });

  document.getElementById("respuesta").value="";

  setTimeout(()=>{ nuevaRonda(); },500);
}

// ENTER
document.getElementById("respuesta").addEventListener("keypress", e=>{
  if(e.key==="Enter") responder();
});
</script>

</body>
</html>


</html>
