<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔥 Test Firebase Camellos</title>

<style>
body {
  font-family: Arial;
  background: #111827;
  color: white;
  text-align: center;
  padding: 40px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#output {
  margin-top: 20px;
  font-size: 20px;
  color: yellow;
}
</style>
</head>

<body>

<h1>🔥 Test Firebase Camellos</h1>

<button onclick="crear()">Crear dato</button>
<button onclick="leer()">Leer dato</button>

<div id="output"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ✅ TU CONFIG (YA PUESTA)
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d",
  storageBucket: "camellos-dcf0d.firebasestorage.app",
  messagingSenderId: "85481612011",
  appId: "1:85481612011:web:8e21aedd852b2cd1d994ae"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 CREAR
window.crear = async () => {
  try {
    await set(ref(db, "test"), {
      mensaje: "🔥 Firebase funcionando"
    });

    document.getElementById("output").innerText = "Dato creado";
  } catch (e) {
    console.error(e);
    document.getElementById("output").innerText = "Error creando";
  }
};

// 🔥 LEER
window.leer = async () => {
  try {
    const snap = await get(ref(db, "test"));

    if (snap.exists()) {
      document.getElementById("output").innerText =
        snap.val().mensaje;
    } else {
      document.getElementById("output").innerText =
        "No existe dato";
    }
  } catch (e) {
    console.error(e);
    document.getElementById("output").innerText = "Error leyendo";
  }
};
</script>

</body>
</html>


</body>
</html>
