<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Carrera Camellos PRO</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

#pista {
  height: 220px;
  border: 2px solid white;
  margin: 20px;
  position: relative;
  overflow: hidden;
}

/* 🏁 META REAL */
.meta {
  position: absolute;
  right: 0;
  width: 20px;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    white 0px,
    white 10px,
    black 10px,
    black 20px
  );
}

.camello {
  position: absolute;
  left: 0;
  font-size: 30px;
  transition: transform 0.3s;
}

#c0 { top: 10px; }
#c1 { top: 60px; }
#c2 { top: 110px; }
#c3 { top: 160px; }

#pregunta {
  font-size: 22px;
  color: yellow;
}

#timer {
  font-size: 20px;
  color: cyan;
}

#resultado {
  font-size: 20px;
  margin: 10px;
}
</style>
</head>

<body>

<h1>🐪 Carrera de Camellos</h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<h2 id="pregunta">Esperando...</h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta" placeholder="Respuesta">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">
  <div class="meta"></div>
  <div class="camello" id="c0">🐪</div>
  <div class="camello" id="c1">🐪</div>
  <div class="camello" id="c2">🐪</div>
  <div class="camello" id="c3">🐪</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sala=null;
let grupo=null;
let META=50;
let tiempo=20;
let intervalo=null;
let respondido=false;

// 🎲 código
function generarCodigo(){
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

// 🧠 preguntas (SOLO 2 TIPOS)
function nuevaPregunta(){
  let tipo=Math.floor(Math.random()*2);

  let g=Math.floor(Math.random()*50);
  let m=Math.floor(Math.random()*60);

  if(tipo==0){
    return{
      texto:`${g}° ${m}' → minutos`,
      respuesta:(g*60+m).toString()
    };
  }else{
    return{
      texto:`${g}° ${m}' → grados`,
      respuesta:(g+m/60).toFixed(2)
    };
  }
}

// 🏁 crear
function crearSala(){
  const code=generarCodigo();
  sala=code;
  grupo=document.getElementById("grupo").value;

  document.getElementById("codigoSala").innerText=code;

  db.ref("salas/"+code).set({
    jugadores:{
      0:{pos:0},
      1:{pos:0},
      2:{pos:0},
      3:{pos:0}
    },
    pregunta:nuevaPregunta(),
    ganador:null
  });

  escuchar();
}

// 👥 unirse
function unirse(){
  sala=document.getElementById("codigo").value.toUpperCase();
  grupo=document.getElementById("grupo").value;
  escuchar();
}

// 👂 escuchar
function escuchar(){
  db.ref("salas/"+sala).on("value",snap=>{
    const data=snap.val();
    if(!data)return;

    document.getElementById("pregunta").innerText=data.pregunta.texto;

    for(let i=0;i<4;i++){
      let pos=data.jugadores[i]?.pos||0;
      document.getElementById("c"+i).style.transform=
        `translateX(${pos*8}px)`;
    }

    if(data.ganador!==null){
      document.getElementById("ganador").innerText=
        "🏆 GANA GRUPO "+(parseInt(data.ganador)+1);
      clearInterval(intervalo);
    }
  });

  iniciarTimer();
}

// ⏱️ timer
function iniciarTimer(){
  clearInterval(intervalo);
  tiempo=20;
  respondido=false;
  document.getElementById("resultado").innerText="";

  intervalo=setInterval(()=>{
    document.getElementById("timer").innerText="Tiempo: "+tiempo;
    tiempo--;

    if(tiempo<0){
      cambiarPregunta();
    }
  },1000);
}

// 🎯 responder
function responder(){
  if(respondido)return;
  respondido=true;

  const val=document.getElementById("respuesta").value;

  db.ref("salas/"+sala).once("value",snap=>{
    const data=snap.val();
    if(data.ganador!==null)return;

    let correcto=val==data.pregunta.respuesta;

    document.getElementById("resultado").innerText=
      correcto ? "✅ Correcto" : "❌ Incorrecto";

    let pos=data.jugadores[grupo].pos;
    pos=correcto?pos+1:pos-1;

    if(pos>=META){
      db.ref("salas/"+sala).update({ganador:grupo});
    }

    db.ref(`salas/${sala}/jugadores/${grupo}`).update({pos});

    cambiarPregunta();
  });
}

// 🔁 cambiar pregunta
function cambiarPregunta(){
  db.ref("salas/"+sala).update({
    pregunta:nuevaPregunta()
  });
  iniciarTimer();
}
</script>

</body>
</html>
