<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>рџЋ® Juegos de Carrera</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }

.pantalla { display:none; }
.activa { display:block; }

#pista {
  width:90%;
  height:260px;
  margin:20px auto;
  border:2px solid white;
  position:relative;
}

.meta {
  position:absolute;
  right:0;
  width:20px;
  height:100%;
  background: repeating-linear-gradient(
    0deg, white 0px, white 10px, black 10px, black 20px
  );
}

.personaje {
  position:absolute;
  font-size:32px;
  transition:0.4s linear;
}

#c0 { top:10%; }
#c1 { top:35%; }
#c2 { top:60%; }
#c3 { top:85%; }

#mensajeUnion {
  margin-top:10px;
  font-size:18px;
  color: lightgreen;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div id="menu" class="pantalla activa">
  <h1>рџЋ® Selecciona juego</h1>
  <button onclick="iniciarModo('camellos')">рџђЄ Camellos</button>
  <button onclick="iniciarModo('atletismo')">рџЏѓ Atletismo</button>
  <button onclick="iniciarModo('caballos')">рџђЋ Caballos</button>
</div>

<div id="juego" class="pantalla">

<h1 id="titulo"></h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button id="btnCrear" onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="CГіdigo">
<button onclick="unirse()">Unirse</button>

<h3 id="mensajeUnion"></h3>

<br><br>

<button onclick="empezar()">рџљЂ Empezar carrera</button>

<h2 id="pregunta"></h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">
  <div class="meta"></div>
  <div id="c0" class="personaje"></div>
  <div id="c1" class="personaje"></div>
  <div id="c2" class="personaje"></div>
  <div id="c3" class="personaje"></div>
</div>

<h2>рџЏ† Ranking global</h2>
<div id="ranking"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let modo="camellos";
let sala=null, grupo=null;
let META=20;
let tiempo=40, intervalo, respondido=false;
let preguntaActual=null;

// modo
function iniciarModo(m){
  modo=m;
  document.getElementById("menu").classList.remove("activa");
  document.getElementById("juego").classList.add("activa");

  if(m==="camellos"){
    document.getElementById("titulo").innerText="рџђЄ Carrera de Camellos";
    poner("рџђ«вћЎпёЏ");
    document.getElementById("pista").style.background="#222";
  } else if(m==="atletismo"){
    document.getElementById("titulo").innerText="рџЏѓ Carrera de Atletismo";
    poner("рџЏѓвЂЌв™‚пёЏвћЎпёЏ");
    document.getElementById("pista").style.background="#8B4513";
  } else {
    document.getElementById("titulo").innerText="рџђЋ Carrera de Caballos";
    poner("рџђЋвћЎпёЏ");
    document.getElementById("pista").style.background="#3a3a3a";
  }
}

function poner(icono){
  for(let i=0;i<4;i++){
    document.getElementById("c"+i).innerText=icono;
  }
}

// preguntas
function nuevaPregunta(){
  let g=Math.floor(Math.random()*50);
  let m=Math.floor(Math.random()*60);

  if(Math.random()>0.5){
    return {
      texto:`${g}В° ${m}' в†’ minutos`,
      respuesta:g*60+m,
      tipo:"minutos"
    };
  } else {
    return {
      texto:`${g}В° ${m}' в†’ grados`,
      respuesta:g+(m/60),
      tipo:"grados"
    };
  }
}

// crear sala
function crearSala(){
  if(sala !== null) return;

  sala=Math.random().toString(36).substring(2,6).toUpperCase();
  grupo=document.getElementById("grupo").value;

  document.getElementById("codigoSala").innerText=sala;
  document.getElementById("btnCrear").disabled = true;

  db.ref("salas/"+sala).set({
    jugadores:{0:{pos:0},1:{pos:0},2:{pos:0},3:{pos:0}},
    empezado:false,
    terminado:false
  });

  escuchar();
}

// unirse
function unirse(){
  sala=document.getElementById("codigo").value.toUpperCase();
  grupo=document.getElementById("grupo").value;
  let nombre=document.getElementById("nombre").value;

  if(nombre===""){ alert("Escribe tu nombre"); return; }
  if(sala===""){ alert("Escribe el cГіdigo"); return; }

  document.getElementById("mensajeUnion").innerText =
    nombre + " te has aГ±adido al Grupo " + (parseInt(grupo)+1);

  escuchar();
}

// empezar
function empezar(){
  db.ref("salas/"+sala).update({empezado:true});
}

// escuchar
function escuchar(){
  db.ref("salas/"+sala).on("value",snap=>{
    const d=snap.val(); if(!d)return;

    for(let i=0;i<4;i++){
      let x=(d.jugadores[i].pos/META)*100;
      document.getElementById("c"+i).style.left=x+"%";
    }

    if(d.empezado && !intervalo){
      nuevaRonda();
    }

    if(d.terminado){
      mostrarGanador();
      clearInterval(intervalo);
    }
  });

  escucharRanking();
}

// ronda
function nuevaRonda(){
  preguntaActual=nuevaPregunta();
  document.getElementById("pregunta").innerText=preguntaActual.texto;
  iniciarTimer();
}

// timer
function iniciarTimer(){
  clearInterval(intervalo);
  tiempo=40;
  respondido=false;
  document.getElementById("resultado").innerText="";

  intervalo=setInterval(()=>{
    document.getElementById("timer").innerText="Tiempo: "+tiempo;
    tiempo--;
    if(tiempo<0) nuevaRonda();
  },1000);
}

// responder con soluciГіn
function responder(){
  let val=document.getElementById("respuesta").value.trim();
  if(val===""||respondido)return;
  respondido=true;

  val = val.replace(",", ".");

  let correcto=false;

  if(preguntaActual.tipo==="minutos"){
    correcto = Number(val) === preguntaActual.respuesta;
  }else{
    correcto = Math.abs(Number(val)-preguntaActual.respuesta)<0.01;
  }

  let solucion = preguntaActual.tipo==="grados"
    ? preguntaActual.respuesta.toFixed(2)
    : preguntaActual.respuesta;

  document.getElementById("resultado").innerText =
    correcto ? "вњ… Correcto" : "вќЊ Incorrecto в†’ Correcto: " + solucion;

  db.ref("salas/"+sala).once("value").then(snap=>{
    let d=snap.val();
    let pos=d.jugadores[grupo].pos;

    if(correcto){
      pos++;
    }else{
      pos--;
      if(pos<0) pos=0;
    }

    if(pos>=META){
      db.ref("salas/"+sala).update({
        terminado:true,
        posiciones:ordenar(d.jugadores)
      });
      asignarPuntos(d.jugadores);
    }

    db.ref(`salas/${sala}/jugadores/${grupo}`).update({pos});
  });

  document.getElementById("respuesta").value="";
  setTimeout(()=>nuevaRonda(),500);
}

// ordenar
function ordenar(j){
  return Object.entries(j)
    .sort((a,b)=>b[1].pos-a[1].pos)
    .map(e=>e[0]);
}

// puntos
function asignarPuntos(j){
  let orden=ordenar(j);
  let pts=[5,3,1];

  orden.forEach((g,i)=>{
    if(i<3){
      db.ref("ranking/"+g).transaction(p=>(p||0)+pts[i]);
    }
  });
}

// ganador
function mostrarGanador(){
  db.ref("salas/"+sala+"/posiciones").once("value").then(snap=>{
    let orden=snap.val();

    document.getElementById("ganador").innerText =
      "рџЏ† GANA GRUPO "+(parseInt(orden[0])+1);

    document.getElementById("btnCrear").disabled = false;
    sala = null;
  });
}

// ranking
function escucharRanking(){
  db.ref("ranking").on("value",snap=>{
    let r=snap.val()||{};
    let html="";
    for(let i=0;i<4;i++){
      html += `Grupo ${i+1}: ${r[i]||0} puntos<br>`;
    }
    document.getElementById("ranking").innerHTML=html;
  });
}

// enter
document.getElementById("respuesta").addEventListener("keypress",e=>{
  if(e.key==="Enter") responder();
});
</script>

</body>
</html>
