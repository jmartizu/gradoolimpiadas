<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎮 Carrera de Camellos</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }

#pista {
  width:90%;
  height:260px;
  margin:20px auto;
  border:2px solid white;
  position:relative;
}

.meta {
  position:absolute;
  right:0;
  width:20px;
  height:100%;
  background: repeating-linear-gradient(
    0deg, white 0px, white 10px, black 10px, black 20px
  );
}

.personaje {
  position:absolute;
  font-size:32px;
  transition:0.4s linear;
}

#c0 { top:10%; }
#c1 { top:35%; }
#c2 { top:60%; }
#c3 { top:85%; }

#mensajeUnion {
  margin-top:10px;
  font-size:18px;
  color: lightgreen;
}
</style>
</head>

<body>

<h1>🐪 Carrera de Camellos</h1>

<input id="nombre" placeholder="Nombre">
<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>
<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<h3 id="mensajeUnion"></h3>

<br><br>

<button onclick="empezar()">🚀 Empezar carrera</button>

<h2 id="pregunta"></h2>
<h3 id="timer"></h3>
<h3 id="resultado"></h3>

<input id="respuesta">
<button onclick="responder()">Responder</button>

<h2 id="ganador"></h2>

<div id="pista">
  <div class="meta"></div>

  <div id="c0" class="personaje">🐫➡️</div>
  <div id="c1" class="personaje">🐫➡️</div>
  <div id="c2" class="personaje">🐫➡️</div>
  <div id="c3" class="personaje">🐫➡️</div>
</div>

<h2>🏆 Ranking global</h2>
<div id="ranking"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sala=null, grupo=null;
let META=20;
let tiempo=40, intervalo, respondido=false;
let preguntaActual=null;

// preguntas
function nuevaPregunta(){
  let g=Math.floor(Math.random()*50);
  let m=Math.floor(Math.random()*60);
  if(Math.random()>0.5){
    return { texto:`${g}° ${m}' → minutos`, respuesta:(g*60+m)+"" };
  } else {
    return { texto:`${g}° ${m}' → grados`, respuesta:(g+m/60).toFixed(2) };
  }
}

// crear
function crearSala(){
  sala=Math.random().toString(36).substring(2,6).toUpperCase();
  grupo=document.getElementById("grupo").value;

  document.getElementById("codigoSala").innerText=sala;

  db.ref("salas/"+sala).set({
    jugadores:{0:{pos:0},1:{pos:0},2:{pos:0},3:{pos:0}},
    empezado:false,
    terminado:false
  });

  escuchar();
}

// unirse (FIX DEFINITIVO)
function unirse(){
  sala = document.getElementById("codigo").value.toUpperCase();
  grupo = document.getElementById("grupo").value;
  let nombre = document.getElementById("nombre").value;

  if(nombre===""){
    alert("Escribe tu nombre");
    return;
  }

  if(sala===""){
    alert("Escribe el código");
    return;
  }

  const msg = document.getElementById("mensajeUnion");

  msg.style.display = "block";
  msg.innerText = nombre + " te has añadido al Grupo " + (parseInt(grupo)+1);

  escuchar();
}

// empezar
function empezar(){
  db.ref("salas/"+sala).update({empezado:true});
}

// escuchar
function escuchar(){
  db.ref("salas/"+sala).on("value",snap=>{
    const d=snap.val(); if(!d)return;

    for(let i=0;i<4;i++){
      let x=(d.jugadores[i].pos/META)*100;
      document.getElementById("c"+i).style.left=x+"%";
    }

    if(d.empezado && !intervalo){
      nuevaRonda();
    }

    if(d.terminado){
      mostrarGanador();
      clearInterval(intervalo);
    }
  });

  escucharRanking();
}

// ronda
function nuevaRonda(){
  preguntaActual=nuevaPregunta();
  document.getElementById("pregunta").innerText=preguntaActual.texto;
  iniciarTimer();
}

// timer
function iniciarTimer(){
  clearInterval(intervalo);
  tiempo=40;
  respondido=false;
  document.getElementById("resultado").innerText="";

  intervalo=setInterval(()=>{
    document.getElementById("timer").innerText="Tiempo: "+tiempo;
    tiempo--;
    if(tiempo<0) nuevaRonda();
  },1000);
}

// responder
function responder(){
  const val=document.getElementById("respuesta").value.trim();
  if(val===""||respondido)return;
  respondido=true;

  let correcto=val==preguntaActual.respuesta;

  document.getElementById("resultado").innerText =
    correcto?"✅ Correcto":"❌ Incorrecto";

  db.ref("salas/"+sala).once("value").then(snap=>{
    let d=snap.val();
    let pos=d.jugadores[grupo].pos;

    if(correcto) pos++;

    if(pos>=META){
      db.ref("salas/"+sala).update({
        terminado:true,
        posiciones:ordenar(d.jugadores)
      });
      asignarPuntos(d.jugadores);
    }

    db.ref(`salas/${sala}/jugadores/${grupo}`).update({pos});
  });

  document.getElementById("respuesta").value="";
  setTimeout(()=>nuevaRonda(),500);
}

// ordenar
function ordenar(j){
  return Object.entries(j)
    .sort((a,b)=>b[1].pos-a[1].pos)
    .map(e=>e[0]);
}

// puntos
function asignarPuntos(j){
  let orden=ordenar(j);
  let pts=[5,3,1];

  orden.forEach((g,i)=>{
    if(i<3){
      db.ref("ranking/"+g).transaction(p=>(p||0)+pts[i]);
    }
  });
}

// ganador
function mostrarGanador(){
  db.ref("salas/"+sala+"/posiciones").once("value").then(snap=>{
    let orden=snap.val();
    document.getElementById("ganador").innerText =
      "🏆 GANA GRUPO "+(parseInt(orden[0])+1);
  });
}

// ranking
function escucharRanking(){
  db.ref("ranking").on("value",snap=>{
    let r=snap.val()||{};
    let html="";
    for(let i=0;i<4;i++){
      html += `Grupo ${i+1}: ${r[i]||0} puntos<br>`;
    }
    document.getElementById("ranking").innerHTML=html;
  });
}

// enter
document.getElementById("respuesta").addEventListener("keypress",e=>{
  if(e.key==="Enter") responder();
});
</script>

</body>
</html>




</html>
