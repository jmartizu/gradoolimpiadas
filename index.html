<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Paso 2 FINAL</title>

<style>
body {
  font-family: Arial;
  background: #111827;
  color: white;
  text-align: center;
  padding: 30px;
}

input, select, button {
  padding: 10px;
  margin: 5px;
}

#codigoSala {
  font-size: 28px;
  color: yellow;
  margin: 10px;
}

#estado {
  margin-top: 10px;
  color: lightgreen;
}
</style>
</head>

<body>

<h1>🐪 Crear / Unirse a sala</h1>

<input id="nombre" placeholder="Tu nombre">

<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>

<div id="codigoSala"></div>

<hr>

<h2>Unirse a sala existente</h2>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<div id="estado"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 CONFIG FIREBASE (CORRECTA)
const firebaseConfig = {
  apiKey: "AIzaSyCM7TJS74FMJCdv0zALrR11Hf66OPx7eSk",
  authDomain: "olimpiadas-gradoolimpicas.firebaseapp.com",
  databaseURL: "https://olimpiadas-gradoolimpicas-default-rtdb.firebaseio.com",
  projectId: "olimpiadas-gradoolimpicas"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🎲 generar código
function generarCodigo() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// 🏁 crear sala + unirse automáticamente
window.crearSala = async () => {
  const nombre = document.getElementById("nombre").value || "PROFESOR";
  const grupo = document.getElementById("grupo").value;

  const code = generarCodigo();

  document.getElementById("codigoSala").innerText = "CÓDIGO: " + code;

  // crear sala
  await set(ref(db, "salas/" + code), {
    jugadores: {
      0: null,
      1: null,
      2: null,
      3: null
    }
  });

  // 🔥 te unes automáticamente
  await set(ref(db, `salas/${code}/jugadores/${grupo}`), {
    nombre
  });

  document.getElementById("estado").innerText =
    "Sala creada y unido como Grupo " + (parseInt(grupo) + 1);
};

// 👥 unirse manual
window.unirse = async () => {
  const nombre = document.getElementById("nombre").value;
  const grupo = document.getElementById("grupo").value;
  const code = document.getElementById("codigo").value.toUpperCase();

  if (!nombre) return alert("Pon nombre");

  const snap = await get(ref(db, "salas/" + code));

  if (!snap.exists()) return alert("Sala no existe");

  // 🔥 entra siempre
  await set(ref(db, `salas/${code}/jugadores/${grupo}`), {
    nombre
  });

  document.getElementById("estado").innerText =
    "Te uniste al Grupo " + (parseInt(grupo) + 1);
};
</script>

</body>
</html>
