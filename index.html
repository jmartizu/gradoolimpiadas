<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Carrera de Camellos</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button, select {
  padding: 10px;
  margin: 5px;
}

#codigoSala {
  font-size: 28px;
  color: yellow;
}

#pista {
  margin: 20px;
  height: 200px;
  border: 2px solid white;
  position: relative;
}

.camello {
  position: absolute;
  left: 0;
  font-size: 30px;
  transition: transform 0.3s;
}

#c0 { top: 10px; }
#c1 { top: 60px; }
#c2 { top: 110px; }
#c3 { top: 160px; }
</style>
</head>

<body>

<h1>🐪 Carrera de Camellos</h1>

<input id="nombre" placeholder="Tu nombre">

<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>

<div id="codigoSala"></div>

<hr>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<br><br>

<button onclick="avanzar()">🐪 Avanzar</button>

<div id="pista">
  <div class="camello" id="c0">🐪</div>
  <div class="camello" id="c1">🐪</div>
  <div class="camello" id="c2">🐪</div>
  <div class="camello" id="c3">🐪</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sala = null;
let grupo = null;

// 🎲 código
function generarCodigo() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// 🏁 crear
function crearSala() {
  const nombre = document.getElementById("nombre").value || "PROFESOR";
  grupo = document.getElementById("grupo").value;

  const code = generarCodigo();
  sala = code;

  document.getElementById("codigoSala").innerText = "CÓDIGO: " + code;

  db.ref("salas/" + code).set({
    jugadores: {
      0: { nombre: "", pos: 0 },
      1: { nombre: "", pos: 0 },
      2: { nombre: "", pos: 0 },
      3: { nombre: "", pos: 0 }
    }
  });

  db.ref(`salas/${code}/jugadores/${grupo}`).set({
    nombre,
    pos: 0
  });

  escuchar();
}

// 👥 unirse
function unirse() {
  const nombre = document.getElementById("nombre").value;
  grupo = document.getElementById("grupo").value;
  const code = document.getElementById("codigo").value.toUpperCase();

  sala = code;

  db.ref("salas/" + code).once("value", snap => {
    if (!snap.exists()) return alert("Sala no existe");

    db.ref(`salas/${code}/jugadores/${grupo}`).set({
      nombre,
      pos: 0
    });

    escuchar();
  });
}

// 👂 escuchar cambios
function escuchar() {
  db.ref("salas/" + sala).on("value", snap => {
    const data = snap.val();
    if (!data) return;

    for (let i = 0; i < 4; i++) {
      const jugador = data.jugadores[i];
      const pos = jugador?.pos || 0;

      document.getElementById("c" + i).style.transform =
        `translateX(${pos * 10}px)`;
    }
  });
}

// 🐪 avanzar
function avanzar() {
  const refJugador = db.ref(`salas/${sala}/jugadores/${grupo}`);

  refJugador.once("value", snap => {
    const data = snap.val();
    const nuevaPos = (data.pos || 0) + 1;

    refJugador.update({ pos: nuevaPos });
  });
}
</script>

</body>
</html>
