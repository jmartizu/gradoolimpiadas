<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Carrera de Camellos - Clase</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0d0d1a;
  color: white;
}

h1 { margin-top: 10px; }

#codigoSala {
  font-size: 30px;
  color: yellow;
  margin: 10px;
}

#pista {
  height: 220px;
  border: 2px solid white;
  margin: 20px;
  position: relative;
}

.camello {
  position: absolute;
  left: 0;
  font-size: 30px;
  transition: transform 0.3s;
}

#c0 { top: 10px; }
#c1 { top: 60px; }
#c2 { top: 110px; }
#c3 { top: 160px; }

input, button, select {
  padding: 10px;
  margin: 5px;
}

#ranking {
  list-style: none;
  padding: 0;
}
</style>
</head>

<body>

<h1>🐪 Carrera de Camellos (Clase)</h1>

<input id="name" placeholder="Nombre">

<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">👨‍🏫 Crear clase</button>

<br>

<input id="codigo" placeholder="Código clase">
<button onclick="unirseSala()">Unirse</button>

<div id="codigoSala"></div>

<h2 id="pregunta"></h2>

<div id="pista">
  <div class="camello" id="c0">🐪</div>
  <div class="camello" id="c1">🐪</div>
  <div class="camello" id="c2">🐪</div>
  <div class="camello" id="c3">🐪</div>
</div>

<input id="respuesta" placeholder="Respuesta">
<button onclick="responder()">Responder</button>

<h2>🏆 Ranking</h2>
<ul id="ranking"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, set, update, onValue, get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ✅ TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCM7TJS74FMJCdv0zALrR11Hf66OPx7eSk",
  authDomain: "olimpiadas-gradoolimpicas.firebaseapp.com",
  projectId: "olimpiadas-gradoolimpicas",
  storageBucket: "olimpiadas-gradoolimpicas.firebasestorage.app",
  messagingSenderId: "774721061799",
  appId: "1:774721061799:web:34ad8e40a90d7322936c82"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let sala = null;
let jugador = null;

// 🔥 GENERAR CÓDIGO
function generarCodigo() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// 👨‍🏫 CREAR SALA (FIABLE)
window.crearSala = async () => {
  try {
    const nombre = document.getElementById("name").value || "PROFESOR";

    const code = generarCodigo();

    // 🔥 mostrar SIEMPRE
    document.getElementById("codigoSala").innerText = "CÓDIGO: " + code;

    sala = code;

    await set(ref(db, "salas/" + code), {
      jugadores: {},
      pregunta: generarPregunta()
    });

    escuchar();

  } catch (error) {
    console.error(error);
    alert("Error creando sala (mira F12)");
  }
};

// 👨‍🎓 UNIRSE
window.unirseSala = async () => {
  try {
    const code = document.getElementById("codigo").value.toUpperCase();
    const nombre = document.getElementById("name").value;
    const grupo = document.getElementById("grupo").value;

    if (!nombre) return alert("Pon nombre");

    const snap = await get(ref(db, "salas/" + code));
    if (!snap.exists()) return alert("Sala no existe");

    const jugadores = snap.val().jugadores || {};

    if (jugadores[grupo]) return alert("Grupo ocupado");

    await update(ref(db, `salas/${code}/jugadores/${grupo}`), {
      nombre,
      pos: 0
    });

    sala = code;
    jugador = grupo;

    document.getElementById("codigoSala").innerText = "CÓDIGO: " + code;

    escuchar();

  } catch (error) {
    console.error(error);
    alert("Error al unirse");
  }
};

// 👂 ESCUCHAR TIEMPO REAL
function escuchar() {
  onValue(ref(db, "salas/" + sala), snap => {
    const data = snap.val();
    if (data) render(data);
  });
}

// 🧠 PREGUNTA GLOBAL
function generarPregunta() {
  if (Math.random() > 0.5) {
    let g = Math.floor(Math.random() * 50);
    let m = Math.floor(Math.random() * 60);
    return {
      texto: `${g}° ${m}' → decimal`,
      respuesta: (g + m / 60).toFixed(2)
    };
  } else {
    let val = (Math.random() * 50).toFixed(2);
    let min = Math.round((val % 1) * 60);
    return {
      texto: `${val}° → grados y minutos (ej: 12 30)`,
      respuesta: `${Math.floor(val)} ${min}`
    };
  }
}

// 🎨 RENDER
function render(data) {
  document.getElementById("pregunta").innerText = data.pregunta.texto;

  const ranking = document.getElementById("ranking");
  ranking.innerHTML = "";

  for (let i = 0; i < 4; i++) {
    const j = data.jugadores[i];

    if (j) {
      document.getElementById("c" + i).style.transform =
        `translateX(${j.pos * 10}px)`;

      ranking.innerHTML += `<li>${j.nombre} (${j.pos})</li>`;
    }
  }
}

// 🎯 RESPONDER
window.responder = async () => {
  try {
    const val = document.getElementById("respuesta").value;

    const salaRef = ref(db, "salas/" + sala);
    const snap = await get(salaRef);
    const data = snap.val();

    const correcto = val == data.pregunta.respuesta;

    const jugadorRef = ref(db, `salas/${sala}/jugadores/${jugador}`);
    const snapJugador = await get(jugadorRef);

    let pos = snapJugador.val().pos;
    pos = correcto ? pos + 1 : pos - 1;

    await update(jugadorRef, { pos });

    // 🔥 nueva pregunta para todos
    await update(salaRef, {
      pregunta: generarPregunta()
    });

  } catch (error) {
    console.error(error);
  }
};
</script>

</body>
</html>
