```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐪 Camellos - Sala</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 30px;
}

input, button, select {
  padding: 10px;
  margin: 5px;
}

#codigoSala {
  font-size: 30px;
  color: yellow;
}
</style>
</head>

<body>

<h1>🐪 Sala de juego</h1>

<input id="nombre" placeholder="Tu nombre">

<select id="grupo">
  <option value="0">Grupo 1</option>
  <option value="1">Grupo 2</option>
  <option value="2">Grupo 3</option>
  <option value="3">Grupo 4</option>
</select>

<br>

<button onclick="crearSala()">Crear sala</button>

<div id="codigoSala"></div>

<hr>

<h2>Unirse</h2>

<input id="codigo" placeholder="Código">
<button onclick="unirse()">Unirse</button>

<div id="estado"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 🔥 TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAgA1B1liq0K6pHn1HqpQ8hXZbxVgqrEt4",
  authDomain: "camellos-dcf0d.firebaseapp.com",
  databaseURL: "https://camellos-dcf0d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "camellos-dcf0d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🎲 código
function generarCodigo() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

// 🏁 crear sala
function crearSala() {
  const nombre = document.getElementById("nombre").value || "PROFESOR";
  const grupo = document.getElementById("grupo").value;

  const code = generarCodigo();

  document.getElementById("codigoSala").innerText = "CÓDIGO: " + code;

  db.ref("salas/" + code).set({
    jugadores: {
      0: null,
      1: null,
      2: null,
      3: null
    }
  });

  // 🔥 se une automáticamente
  db.ref("salas/" + code + "/jugadores/" + grupo).set({
    nombre
  });

  document.getElementById("estado").innerText =
    "Sala creada y unido como Grupo " + (parseInt(grupo) + 1);
}

// 👥 unirse
function unirse() {
  const nombre = document.getElementById("nombre").value;
  const grupo = document.getElementById("grupo").value;
  const code = document.getElementById("codigo").value.toUpperCase();

  if (!nombre) return alert("Pon nombre");

  db.ref("salas/" + code).once("value", (snap) => {
    if (!snap.exists()) {
      alert("Sala no existe");
      return;
    }

    // 🔥 entra siempre (sin bug)
    db.ref("salas/" + code + "/jugadores/" + grupo).set({
      nombre
    });

    document.getElementById("estado").innerText =
      "Te uniste al Grupo " + (parseInt(grupo) + 1);
  });
}
</script>

</body>
</html>
